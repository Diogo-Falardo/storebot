version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: dev-storebot-api-container
    ports:
      - "2109:2109"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    env_file:
      - ./api/.env
    environment:
      - NODE_ENV=development
      - PORT=2109 # most express apps respect this
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.dev
    container_name: dev-storebot-bot-container
    # no ports → bot doesn't listen on network
    volumes:
      - ./bot:/app
      - /app/node_modules
    env_file:
      - ./bot/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - api # optional – only if bot needs API available # bot requires api

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: dev-storebot-web-container
    ports:
      - "3000:3000" # TanStack Start dev server
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./web:/app
      ## named the node models to try fix errors
      - web_node_modules:/app/node_modules
    env_file:
      - ./web/.env
    environment:
      - NODE_ENV=development
      # Very important: tell frontend where backend (api) lives inside network
      - VITE_API_URL=http://api:2109
    restart: unless-stopped
    depends_on:
      - api # recommended – web calls api

networks:
  default:
    name: storebot-network

volumes:
  web_node_modules:
  api_node_modules:
