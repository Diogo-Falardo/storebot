version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: dev-storebot-api-container
    ports:
      - "2109:2109"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    env_file:
      - ./api/.env
    environment:
      - NODE_ENV=development
      - PORT=2109
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.dev
    container_name: dev-storebot-bot-container
    volumes:
      - ./bot:/app
      - /app/node_modules
    env_file:
      - ./bot/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - api

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: dev-storebot-web-container
    ports:
      - "3000:3000" #
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    env_file:
      - ./web/.env
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://api:2109
    restart: unless-stopped
    depends_on:
      - api

networks:
  default:
    name: storebot-network

volumes:
  web_node_modules:
  api_node_modules:
